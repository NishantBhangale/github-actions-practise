name: Auto Linter
on:
  push:
    branches: [ main ]
    paths: "*.py"
    # if any changes in any python file (.py) then only run this linter 
    #ignore the linter if changes other than python file

jobs:
  code:
    runs-on: ubuntu-latest
    # this step will automatically clone the code of current branch to runner
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7 
        # install set up python version
      - name: set up python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13' 
        # install linter for python
      - name: Install Linter
        run: pip install ruff
        # this step will run the linter against the .py file
      - name: Check the files for linting
        run: ruff check .
  
